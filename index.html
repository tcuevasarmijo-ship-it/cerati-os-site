<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerati OS</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: sans-serif;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .guitar-logo {
      display: inline-block;
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <section class="min-h-screen flex flex-col items-center justify-center text-center px-6">

    <svg class="guitar-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- Cuerpo de la guitarra -->
      <ellipse cx="50" cy="50" rx="20" ry="28" fill="none" stroke="currentColor" stroke-width="2"/>
      
      <!-- Agujero central -->
      <circle cx="50" cy="50" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
      
      <!-- Cuello -->
      <rect x="45" y="15" width="10" height="30" fill="none" stroke="currentColor" stroke-width="2"/>
      
      <!-- Cabeza -->
      <rect x="40" y="8" width="20" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
      
      <!-- Clavijas (tuning pegs) -->
      <circle cx="42" cy="11" r="2" fill="currentColor"/>
      <circle cx="42" cy="14" r="2" fill="currentColor"/>
      <circle cx="58" cy="11" r="2" fill="currentColor"/>
      <circle cx="58" cy="14" r="2" fill="currentColor"/>
      <circle cx="42" cy="17" r="2" fill="currentColor"/>
      <circle cx="58" cy="17" r="2" fill="currentColor"/>
      
      <!-- Cuerdas -->
      <line x1="50" y1="8" x2="50" y2="78" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
      <line x1="45" y1="10" x2="45" y2="75" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
      <line x1="55" y1="10" x2="55" y2="75" stroke="currentColor" stroke-width="0.8" opacity="0.6"/>
    </svg>

    <h1 class="text-7xl font-black mb-6">
      Cerati OS
    </h1>

    <p class="text-gray-400 text-xl max-w-2xl mb-8">
      A minimal Hyprland-based Linux distribution focused on speed, customization and gaming.
    </p>

    <div class="flex gap-4">

      <a href="https://drive.google.com/file/d/1QqKwU5d0Pr8XijQNLuS3mpAnmnp-WpPC/view?usp=sharing"
         class="glass px-8 py-4 rounded-2xl hover:scale-105 transition">
         Download ISO
      </a>

      <a href="#screenshots"
         class="glass px-8 py-4 rounded-2xl hover:scale-105 transition">
         Screenshots
      </a>

    </div>

  </section>

  <section id="screenshots" class="px-10 pb-20">

    <h2 class="text-4xl font-bold mb-10">
      Screenshots
    </h2>

    <div class="grid md:grid-cols-2 gap-6">

      <div class="glass rounded-3xl overflow-hidden">
        <img src="images/screenshot1.png"
             class="w-full h-80 object-cover">
      </div>

      <div class="glass rounded-3xl overflow-hidden">
        <img src="images/screenshot2.png"
             class="w-full h-80 object-cover">
      </div>

    </div>

  </section>

</body>
</html>
